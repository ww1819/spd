# Spring配置
spring:
  profiles:
    active: dev

# Tomcat 请求头限制（避免 Request header is too large），各环境可覆盖
server:
  tomcat:
    max-http-header-size: 524288  # 512KB
    # 患者收费抓取等长耗时接口（默认约 20s 易超时）
    connection-timeout: 300000

# SQL 启动脚本（按 table → column → view → trigger → procedure 顺序执行）
spd:
  sql:
    init:
      enabled: true
      location: classpath:sql/mysql/
      fail-on-error: false
  # HIS 患者收费镜像抓取（SQL Server 视图较慢时需加大超时、缩小分段）
  his:
    fetch:
      query-timeout-seconds: 600
      chunk-days: 1
      max-range-days: 31
  # 离线授权公钥：留空则从 classpath:license/public.pem 读取（可为证书 PEM）
  license:
    publicKeyPem: ''

# 防止 XSS 攻击（FilterConfig 启动即需；各 profile 可覆盖）
xss:
  enabled: true
  excludes: /system/notice
  urlPatterns: /system/*,/monitor/*,/tool/*

